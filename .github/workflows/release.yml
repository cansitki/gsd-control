name: Release

on:
  push:
    tags:
      - 'v*'

# Never run on PRs or forks — self-hosted runner security
# Only tag pushes trigger this workflow, and only repo owners can push tags

jobs:
  release:
    permissions:
      contents: write
    runs-on: self-hosted
    # Extra safety: only run if triggered by the repo owner
    if: github.repository == 'cansitki/gsd-control'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      # Rust cache: not needed on self-hosted runner (local disk cache persists).
      # swatinem/rust-cache@v2 hangs on post-job cleanup on self-hosted runners.

      - name: Install dependencies
        run: |
          npm ci
          brew install create-dmg || true

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: v__VERSION__
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin
